name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: depot-ubuntu-24.04-16
            name: atomic-x86_64-linux
            cross: false
          - target: aarch64-unknown-linux-musl
            os: depot-ubuntu-24.04-16
            name: atomic-aarch64-linux
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            name: atomic-x86_64-macos
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            name: atomic-aarch64-macos
            cross: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/atomic ${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: depot-ubuntu-24.04-16

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Collect binaries
          mkdir -p release
          for dir in artifacts/*/; do
            cp "$dir"* release/
          done

          # Generate checksums
          cd release
          sha256sum * > SHA256SUMS
          cd ..

          # Create GitHub release
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            release/*
